<!DOCTYPE html>
<html>
<body style="padding:20px;font-family:Arial">
  <h2>Скачайте обе иконки в папку public/</h2>

  <h3>192x192:</h3>
  <canvas id="c192" width="192" height="192"></canvas>
  <br><br>
  <a id="dl192" download="icon-192.png" style="font-size:20px;color:blue">
    ⬇️ Скачать icon-192.png
  </a>

  <h3 style="margin-top:30px">512x512:</h3>
  <canvas id="c512" width="512" height="512"></canvas>
  <br><br>
  <a id="dl512" download="icon-512.png" style="font-size:20px;color:blue">
    ⬇️ Скачать icon-512.png
  </a>

  <script>
    function drawIcon(canvas, size) {
      var ctx = canvas.getContext('2d')
      var r = size * 0.2

      // Синий фон со скруглением
      ctx.fillStyle = '#2563eb'
      ctx.beginPath()
      ctx.moveTo(r, 0)
      ctx.lineTo(size - r, 0)
      ctx.quadraticCurveTo(size, 0, size, r)
      ctx.lineTo(size, size - r)
      ctx.quadraticCurveTo(size, size, size - r, size)
      ctx.lineTo(r, size)
      ctx.quadraticCurveTo(0, size, 0, size - r)
      ctx.lineTo(0, r)
      ctx.quadraticCurveTo(0, 0, r, 0)
      ctx.closePath()
      ctx.fill()

      // Текст "#Т" — крупный, по центру
      ctx.fillStyle = 'white'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.font = 'bold ' + (size * 0.45) + 'px Arial'
      ctx.fillText('#Т', size / 2, size / 2)
    }

    var c192 = document.getElementById('c192')
    var c512 = document.getElementById('c512')
    drawIcon(c192, 192)
    drawIcon(c512, 512)

    document.getElementById('dl192').href = c192.toDataURL('image/png')
    document.getElementById('dl512').href = c512.toDataURL('image/png')
  </script>
</body>
</html>
