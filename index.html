<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Заголовок -->
    <title>#тыжменеджер — дневник целей</title>

    <!-- Иконки -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- PWA Манифест -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Цвет верхней панели браузера -->
    <meta name="theme-color" content="#2563eb" />

    <!-- iOS PWA поддержка -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="#тыжменеджер" />

    <!-- SEO описание -->
    <meta name="description" content="#тыжменеджер — дневник целей эффективного человека. Ставь цели, планируй день, отслеживай прогресс." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Регистрация Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('✅ SW registered:', reg.scope)
            })
            .catch((err) => {
              console.log('❌ SW registration failed:', err)
            })
        })
      }
    </script>
  </body>
</html>
