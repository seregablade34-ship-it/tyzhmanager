<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Заголовок -->
    <title>#тыжменеджер — дневник целей</title>

    <!-- Иконки -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA Манифест -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Цвет верхней панели браузера -->
    <meta name="theme-color" content="#2563eb" />

    <!-- iOS PWA поддержка -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="#тыжменеджер" />

    <!-- SEO описание -->
    <meta name="description" content="#тыжменеджер — дневник целей эффективного человека. Ставь цели, планируй день, отслеживай прогресс." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

   <!-- Регистрация Service Worker с авто-обновлением -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('✅ SW registered:', reg.scope)
              
              // Проверяем обновления каждые 60 секунд
              setInterval(function() {
                reg.update()
              }, 60000)

              // Когда новый SW готов — активируем сразу
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'activated') {
                      console.log('🔄 Новая версия активирована!')
                      window.location.reload()
                    }
                  })
                }
              })
            })
            .catch(function(err) {
              console.log('❌ SW registration failed:', err)
            })
        })
      }
    </script>
  </body>
</html>
